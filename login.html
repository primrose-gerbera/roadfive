<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROADFIVE - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Copy the same styles from register.html */
/* (I'll provide the full file below) */
</style>
</head>
<body>

<!-- BACKGROUND SCENE (same as register.html) -->
<div class="scene">
  <div class="atmosphere"></div>
  <div class="sun"></div>
  <div class="ship">
    <svg class="ship-svg" viewBox="0 0 190 120" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 80 Q95 110 170 80 L160 95 Q95 120 30 95 Z" fill="rgba(180,160,220,0.4)"/>
      <rect x="55" y="50" width="80" height="35" rx="6" fill="rgba(180,160,220,0.25)"/>
      <ellipse cx="95" cy="50" rx="28" ry="18" fill="rgba(108,63,197,0.3)"/>
      <ellipse cx="95" cy="50" rx="18" ry="11" fill="rgba(200,190,255,0.08)"/>
      <path d="M55 75 L10 95 L40 78 Z" fill="rgba(180,160,220,0.2)"/>
      <path d="M135 75 L180 95 L150 78 Z" fill="rgba(180,160,220,0.2)"/>
      <ellipse cx="72" cy="87" rx="6" ry="4" fill="rgba(245,197,24,0.25)"/>
      <ellipse cx="118" cy="87" rx="6" ry="4" fill="rgba(245,197,24,0.25)"/>
      <line x1="95" y1="32" x2="95" y2="18" stroke="rgba(200,190,230,0.3)" stroke-width="1.5"/>
      <circle cx="95" cy="16" r="3" fill="rgba(245,197,24,0.5)"/>
    </svg>
  </div>
  <div class="horizon"></div>
  <div class="tagline-scene">NAVIGATE THE UNKNOWN</div>
</div>

<!-- LOGIN FORM -->
<div class="glass-container">
  <div class="game-title">ROADFIVE</div>
  <div class="tagline-text">Interstellar Rewards Protocol</div>
  
  <form class="signup-form" id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>👤 Username or Email</label>
      <input type="text" id="loginUsername" placeholder="Enter your username or email" required>
    </div>
    <div class="form-group">
      <label>🔒 Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn btn-primary">🚀 Launch</button>
    <div id="loginMessage" class="message" style="display:none;"></div>
  </form>
  
  <div class="login-link">
    Don't have an account? <a href="register.html">Sign up here</a>
  </div>
</div>

<script>
function handleLogin(event) {
  event.preventDefault();
  
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const messageEl = document.getElementById('loginMessage');
  
  if (!username || !password) {
    messageEl.className = 'message error';
    messageEl.textContent = '✕ Please fill in all fields';
    messageEl.style.display = 'block';
    return;
  }
  
  // Get users from localStorage
  const users = JSON.parse(localStorage.getItem('roadfive_users') || '[]');
  
  // Find user by username or email
  const user = users.find(u => 
    (u.username === username || u.email === username) && 
    u.password === password
  );
  
  if (!user) {
    messageEl.className = 'message error';
    messageEl.textContent = '✕ Invalid username or password';
    messageEl.style.display = 'block';
    return;
  }
  
  // Set current session
  localStorage.setItem('roadfive_current_user', JSON.stringify(user));
  
  // Show success
  messageEl.className = 'message success';
  messageEl.textContent = `✅ Welcome back, ${user.username}! Redirecting...`;
  messageEl.style.display = 'block';
  
  // Redirect to dashboard
  setTimeout(() => {
    window.location.href = 'player-dashboard.html';
  }, 1500);
}

// Allow Enter key to submit
document.getElementById('loginForm').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    handleLogin(e);
  }
});
</script>
</body>
</html>
