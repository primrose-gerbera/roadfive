<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ROADFIVE – Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:   #F5C518;
            --purple: #6C3FC5;
            --violet: #3B1F6A;
            --bg:     #0A0A10;
            --card:   rgba(15, 12, 30, 0.78);
            --input:  rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.10);
            --text:   #E0D9F5;
            --muted:  rgba(200,190,230,0.50);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        .scene {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 0;
            pointer-events: none;
        }

        .sun {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 60%,
                #FFD966 0%,
                #E8872A 28%,
                #A8246A 55%,
                transparent 72%);
            filter: blur(2px);
            opacity: 0.92;
        }

        .atmosphere {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 55% at 50% 78%,
                    rgba(140, 50, 160, 0.55) 0%,
                    transparent 70%),
                linear-gradient(to bottom, #0A0A10 0%, #1A0D2E 50%, #0A0A10 100%);
        }

        .ship {
            position: absolute;
            bottom: calc(18% + 148px);
            left: 50%;
            transform: translateX(-50%);
            width: 190px;
            opacity: 0.35;
        }

        .horizon {
            position: absolute;
            bottom: 18%;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(to right,
                transparent, rgba(245,197,24,0.45) 20%,
                rgba(245,197,24,0.45) 80%, transparent);
        }

        .tagline {
            position: absolute;
            bottom: calc(18% - 22px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            letter-spacing: 0.22em;
            color: rgba(220,210,240,0.18);
            white-space: nowrap;
            font-weight: 300;
        }

        .stage {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 420px;
            max-width: 92vw;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 40px 40px;
            backdrop-filter: blur(22px) saturate(1.4);
            -webkit-backdrop-filter: blur(22px) saturate(1.4);
            box-shadow:
                0 0 0 1px rgba(108,63,197,0.18),
                0 24px 64px rgba(0,0,0,0.65),
                0 0 80px rgba(108,63,197,0.12) inset;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-bottom: 32px;
        }

        .brand-lock {
            font-size: 40px;
            line-height: 1;
            filter: drop-shadow(0 0 10px rgba(245,197,24,0.5));
        }

        .brand-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 38px;
            letter-spacing: 0.12em;
            color: #fff;
            text-shadow: 0 0 24px rgba(245,197,24,0.35);
        }

        .brand-sub {
            font-size: 10px;
            letter-spacing: 0.30em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 7px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            font-size: 15px;
            color: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder { color: rgba(255,255,255,0.25); }

        input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(108,63,197,0.22);
        }

        .btn-login {
            display: block;
            width: 100%;
            margin-top: 26px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #7B4FD8 0%, #5830A0 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(108,63,197,0.40);
        }

        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(108,63,197,0.55);
        }

        .btn-login:active { transform: translateY(0); }

        .card-footer {
            margin-top: 22px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }

        .card-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .card-footer a:hover { opacity: 0.75; }

        .owner-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 14px;
            font-size: 12px;
            color: var(--gold);
            opacity: 0.65;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
        }

        .owner-link:hover { opacity: 1; }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 16px 0 14px;
        }

        @media (max-width: 480px) {
            .card { padding: 32px 24px 28px; }
            .brand-name { font-size: 30px; }
            .brand-lock { font-size: 32px; }
            .sun { width: 220px; height: 220px; bottom: 15%; }
            .ship { width: 120px; bottom: calc(15% + 100px); }
            .horizon { bottom: 15%; }
            .tagline { bottom: calc(15% - 18px); font-size: 8px; letter-spacing: 0.15em; }
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="atmosphere"></div>
        <div class="sun"></div>
        <svg class="ship" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 140 Q100 155 170 140 L160 165 Q100 178 40 165 Z" fill="#1a0d2e"/>
            <rect x="55" y="110" width="90" height="32" rx="4" fill="#1a0d2e"/>
            <circle cx="75" cy="126" r="5" fill="#2d1a4a"/>
            <circle cx="100" cy="126" r="5" fill="#2d1a4a"/>
            <circle cx="125" cy="126" r="5" fill="#2d1a4a"/>
            <circle cx="100" cy="126" r="4" fill="#3a2460"/>
            <rect x="98" y="30" width="4" height="82" fill="#1a0d2e"/>
            <rect x="70" y="50" width="3" height="62" fill="#1a0d2e"/>
            <rect x="128" y="60" width="3" height="52" fill="#1a0d2e"/>
            <path d="M102 32 Q130 55 130 85 L102 85 Z" fill="#1a0d2e" opacity="0.9"/>
            <path d="M98 32 Q70 55 70 85 L98 85 Z" fill="#1a0d2e" opacity="0.9"/>
            <path d="M102 32 Q118 42 118 58 L102 58 Z" fill="#1a0d2e"/>
            <path d="M98 32 Q82 42 82 58 L98 58 Z" fill="#1a0d2e"/>
            <path d="M73 52 Q90 65 90 82 L73 82 Z" fill="#1a0d2e" opacity="0.85"/>
            <path d="M131 62 Q146 72 146 88 L131 88 Z" fill="#1a0d2e" opacity="0.8"/>
            <path d="M102 30 L116 22 L102 26 Z" fill="#1a0d2e"/>
            <path d="M98 30 L84 20 L98 25 Z" fill="#1a0d2e"/>
            <line x1="55" y1="112" x2="20" y2="95" stroke="#1a0d2e" stroke-width="3"/>
            <path d="M20 95 Q36 104 55 112 L50 100 Z" fill="#1a0d2e" opacity="0.7"/>
            <rect x="93" y="55" width="14" height="8" rx="2" fill="#1a0d2e"/>
            <circle cx="113" cy="22" r="4" fill="#1a0d2e"/>
            <line x1="110" y1="26" x2="116" y2="30" stroke="#1a0d2e" stroke-width="1.5"/>
            <line x1="116" y1="26" x2="110" y2="30" stroke="#1a0d2e" stroke-width="1.5"/>
        </svg>
        <div class="horizon"></div>
        <p class="tagline">weapon of mass distribution</p>
    </div>

    <div class="stage">
        <div class="card">
            <div class="brand">
                <span class="brand-lock">🔐</span>
                <span class="brand-name">ROADFIVE</span>
                <span class="brand-sub">Enter 12-character codes &amp; earn points</span>
            </div>

            <div class="field">
                <label for="username">Username</label>
                <input id="username" type="text" placeholder="Enter username" autocomplete="username"/>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
            </div>

            <button class="btn-login" id="loginBtn">Login</button>

            <hr class="divider"/>

            <div class="card-footer">
                New player? <a href="register.html">Create Account</a>
            </div>

            <a href="owner-login.html" class="owner-link">👑 Owner Login</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
