<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROADFIVE - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="game-title">🔐 ROADFIVE</h1>
        <p class="tagline">Enter 12-Digit Codes & Earn Points!</p>
        
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        
        <div class="auth-links">
            <p>New player? <a href="register.html">Create Account</a></p>
            <hr>
            <p class="owner-link">👑 <a href="owner-login.html">Owner Login</a></p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
