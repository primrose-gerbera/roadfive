<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROADFIVE - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="login.html" class="back-home">← Back</a>
        
        <h1 class="game-title">📝 Create Account</h1>
        
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUsername" required placeholder="Choose a username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" required placeholder="Choose a password">
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="Confirm password">
            </div>
            
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
        
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
