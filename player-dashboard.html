<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ROADFIVE – Player Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="scene">
        <div class="atmosphere"></div>
        <div class="sun"></div>
        <svg class="ship" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 140 Q100 155 170 140 L160 165 Q100 178 40 165 Z" fill="#1a0d2e"/>
            <rect x="55" y="110" width="90" height="32" rx="4" fill="#1a0d2e"/>
            <circle cx="75" cy="126" r="5" fill="#2d1a4a"/>
            <circle cx="100" cy="126" r="5" fill="#2d1a4a"/>
            <circle cx="125" cy="126" r="5" fill="#2d1a4a"/>
            <circle cx="100" cy="126" r="4" fill="#3a2460"/>
            <rect x="98" y="30" width="4" height="82" fill="#1a0d2e"/>
            <rect x="70" y="50" width="3" height="62" fill="#1a0d2e"/>
            <rect x="128" y="60" width="3" height="52" fill="#1a0d2e"/>
            <path d="M102 32 Q130 55 130 85 L102 85 Z" fill="#1a0d2e" opacity="0.9"/>
            <path d="M98 32 Q70 55 70 85 L98 85 Z" fill="#1a0d2e" opacity="0.9"/>
            <path d="M102 32 Q118 42 118 58 L102 58 Z" fill="#1a0d2e"/>
            <path d="M98 32 Q82 42 82 58 L98 58 Z" fill="#1a0d2e"/>
            <path d="M73 52 Q90 65 90 82 L73 82 Z" fill="#1a0d2e" opacity="0.85"/>
            <path d="M131 62 Q146 72 146 88 L131 88 Z" fill="#1a0d2e" opacity="0.8"/>
            <path d="M102 30 L116 22 L102 26 Z" fill="#1a0d2e"/>
            <path d="M98 30 L84 20 L98 25 Z" fill="#1a0d2e"/>
            <line x1="55" y1="112" x2="20" y2="95" stroke="#1a0d2e" stroke-width="3"/>
            <path d="M20 95 Q36 104 55 112 L50 100 Z" fill="#1a0d2e" opacity="0.7"/>
            <rect x="93" y="55" width="14" height="8" rx="2" fill="#1a0d2e"/>
            <circle cx="113" cy="22" r="4" fill="#1a0d2e"/>
            <line x1="110" y1="26" x2="116" y2="30" stroke="#1a0d2e" stroke-width="1.5"/>
            <line x1="116" y1="26" x2="110" y2="30" stroke="#1a0d2e" stroke-width="1.5"/>
        </svg>
        <div class="horizon"></div>
        <p class="tagline">weapon of mass distribution</p>
    </div>

    <div class="glass-container">
        <div class="dashboard-header">
            <h1 class="game-title">🎮 ROADFIVE</h1>
            <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>

        <div class="player-stats">
            <h2>Welcome, <span id="playerName">Player</span>!</h2>
            <div class="points-card">
                <h3>Your Points</h3>
                <div class="points-value" id="totalPoints">0</div>
            </div>
        </div>

        <div class="submit-section">
            <h3>Enter Your 12-Character Code</h3>
            <form id="combinationForm">
                <input type="text" id="combination" maxlength="12" placeholder="Enter 12-character code" pattern="[A-Za-z0-9]{12}" required autocomplete="off" style="text-transform:uppercase;">
                <button type="submit" class="btn btn-primary btn-full">Submit</button>
            </form>
            <div id="message" class="message"></div>
        </div>

        <div class="dashboard-grid">
            <div class="history-section">
                <h3 style="color:rgba(255,255,255,0.1); font-size:0.8em; letter-spacing:3px; text-transform:uppercase;">📜 Your History</h3>
                <div id="historyList" class="history-list">
                    <p style="color:rgba(255,255,255,0.05); text-align:center;">No submissions yet</p>
                </div>
            </div>
            
            <div class="leaderboard-section">
                <h3 style="color:rgba(255,255,255,0.1); font-size:0.8em; letter-spacing:3px; text-transform:uppercase;">🏆 Leaderboard</h3>
                <div id="leaderboard" class="leaderboard-list">
                    <p style="color:rgba(255,255,255,0.05); text-align:center;">No players yet</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
