<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROADFIVE - Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:   #F5C518;
  --purple: #6C3FC5;
  --violet: #3B1F6A;
  --bg:     #0A0A10;
  --card:   rgba(15, 12, 30, 0.78);
  --input:  rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.10);
  --text:   #E0D9F5;
  --muted:  rgba(200,190,230,0.50);
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

body { padding: 20px; min-height: 100vh; }

/* ANIMATIONS */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-30px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes pulseGlow {
  0%,100% { box-shadow: 0 4px 20px rgba(108,63,197,0.40); }
  50%     { box-shadow: 0 4px 40px rgba(108,63,197,0.70); }
}
@keyframes float {
  0%,100% { transform: translateX(-50%) translateY(0px); }
  50%     { transform: translateX(-50%) translateY(-10px); }
}
@keyframes floatSlow {
  0%,100% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
  50%     { transform: translateX(-50%) translateY(-5px) rotate(2deg); }
}
@keyframes pulsePoints {
  0%,100% { transform: scale(1); opacity: 0.2; }
  50%     { transform: scale(1.05); opacity: 0.3; }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-15px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* SCENE */
.scene {
  position: fixed; inset: 0;
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 0; pointer-events: none;
}
.atmosphere {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 55% at 50% 78%, rgba(140,50,160,0.55) 0%, transparent 70%),
    linear-gradient(to bottom, #0A0A10 0%, #1A0D2E 50%, #0A0A10 100%);
}
.sun {
  position: absolute;
  bottom: 18%; left: 50%;
  transform: translateX(-50%);
  width: 340px; height: 340px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 60%,
    #FFD966 0%, #E8872A 28%, #A8246A 55%, transparent 72%);
  filter: blur(2px); opacity: 0.92;
  animation: floatSlow 6s ease-in-out infinite;
}
.ship {
  position: absolute;
  bottom: calc(18% + 148px); left: 50%;
  transform: translateX(-50%);
  width: 190px; opacity: 0.35;
  animation: float 4s ease-in-out infinite;
}
.horizon {
  position: absolute;
  bottom: 18%; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(to right,
    transparent, rgba(245,197,24,0.45) 20%,
    rgba(245,197,24,0.45) 80%, transparent);
}
.tagline-scene {
  position: absolute;
  bottom: calc(18% - 22px); left: 50%;
  transform: translateX(-50%);
  font-size: 11px; letter-spacing: 0.22em;
  color: rgba(220,210,240,0.18);
  white-space: nowrap; font-weight: 300;
}

/* GLASS CONTAINER */
.glass-container {
  position: relative; z-index: 10;
  max-width: 1000px; margin: 0 auto;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 30px;
  backdrop-filter: blur(22px) saturate(1.4);
  -webkit-backdrop-filter: blur(22px) saturate(1.4);
  box-shadow:
    0 0 0 1px rgba(108,63,197,0.18),
    0 24px 64px rgba(0,0,0,0.65),
    0 0 80px rgba(108,63,197,0.12) inset;
  animation: fadeInUp 0.8s cubic-bezier(0.4,0,0.2,1);
}

/* TYPOGRAPHY */
.game-title {
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8em; letter-spacing: 0.12em;
  color: #fff;
  text-shadow: 0 0 24px rgba(245,197,24,0.35);
  animation: fadeInDown 0.6s cubic-bezier(0.4,0,0.2,1);
}
.tagline-text {
  text-align: center; font-size: 10px;
  letter-spacing: 0.30em; color: var(--muted);
  text-transform: uppercase; margin-bottom: 30px;
  animation: fadeInUp 0.6s cubic-bezier(0.4,0,0.2,1);
}

/* DASHBOARD HEADER */
.dashboard-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 30px; flex-wrap: wrap; gap: 15px;
  padding-bottom: 15px; border-bottom: 1px solid var(--border);
  animation: fadeInDown 0.6s cubic-bezier(0.4,0,0.2,1);
}
.header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.owner-label {
  font-weight: 600; color: rgba(255,255,255,0.1);
  padding: 6px 18px; font-size: 0.8em; letter-spacing: 1px;
  background: rgba(255,255,255,0.02); border-radius: 20px;
  border: 1px solid var(--border);
}

/* BUTTONS */
.btn {
  padding: 12px 28px; font-size: 0.9em;
  border: 1px solid var(--border); border-radius: 12px;
  cursor: pointer; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  font-weight: 600; display: inline-block; text-align: center;
  letter-spacing: 0.5px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  color: rgba(255,255,255,0.7);
  position: relative; overflow: hidden;
}
.btn::after {
  content: ''; position: absolute;
  top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  transition: left 0.6s;
}
.btn:hover::after { left: 100%; }
.btn:hover {
  transform: translateY(-3px) scale(1.02);
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.15);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.btn:active { transform: translateY(0) scale(0.98); }

.btn-primary {
  background: linear-gradient(135deg, #7B4FD8 0%, #5830A0 100%);
  color: #fff; border: none;
  box-shadow: 0 4px 20px rgba(108,63,197,0.40);
  animation: pulseGlow 3s ease-in-out infinite;
}
.btn-primary:hover {
  opacity: 0.92;
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 6px 35px rgba(108,63,197,0.60);
}
.btn-secondary {
  background: rgba(255,255,255,0.02); color: var(--muted);
  border-color: var(--border); padding: 8px 16px; font-size: 0.8em;
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.04);
  color: #fff; border-color: rgba(255,255,255,0.15);
}
.btn-logout {
  background: rgba(255,50,50,0.05); color: rgba(255,100,100,0.3);
  border: 1px solid rgba(255,50,50,0.03);
  padding: 8px 16px; border-radius: 12px;
  cursor: pointer; font-weight: 600;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  font-size: 0.8em; font-family: 'Inter', sans-serif;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.btn-logout:hover {
  background: rgba(255,50,50,0.08);
  color: rgba(255,100,100,0.5); transform: translateY(-2px);
}

/* PLAYER STATS */
.player-stats {
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 28px 32px;
  border-radius: 18px;
  margin-bottom: 30px;
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.8s cubic-bezier(0.4,0,0.2,1);
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.player-stats:hover {
  transform: translateY(-2px);
  border-color: rgba(108,63,197,0.15);
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}
.player-stats::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
}
.player-stats h2 { 
  font-weight: 300; 
  font-size: 1em; 
  margin-bottom: 15px;
}
.player-stats h2 span { 
  font-weight: 700; 
  color: rgba(255,255,255,0.8); 
}
.points-card { 
  text-align: center; 
  margin-top: 10px; 
  position: relative; 
  z-index: 1; 
}
.points-card h3 {
  font-weight: 300; 
  opacity: 0.1; 
  font-size: 0.7em;
  letter-spacing: 6px; 
  text-transform: uppercase;
}
.points-value {
  font-size: 4.5em; 
  font-weight: 800;
  color: rgba(255,255,255,0.2);
  animation: pulsePoints 3s ease-in-out infinite;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.points-value:hover { 
  color: rgba(255,255,255,0.3); 
  transform: scale(1.05); 
}

.player-codes {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.player-codes h4 {
  font-weight: 300;
  font-size: 0.7em;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.1);
  margin-bottom: 12px;
}
.code-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}
.code-badge {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  font-family: 'Courier New', monospace;
  font-size: 0.75em;
  text-align: center;
  color: rgba(255,255,255,0.2);
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  letter-spacing: 1px;
}
.code-badge:hover {
  background: rgba(108,63,197,0.05);
  border-color: rgba(108,63,197,0.3);
  color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}
.code-badge.used {
  color: rgba(0,220,0,0.3);
  border-color: rgba(0,220,0,0.1);
}
.code-badge.used:hover {
  background: rgba(0,220,0,0.03);
  border-color: rgba(0,220,0,0.2);
}
.code-badge.invalid {
  color: rgba(255,80,80,0.2);
  border-color: rgba(255,80,80,0.05);
}

/* SUBMIT SECTION */
.submit-section {
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 25px 30px; border-radius: 18px; margin-bottom: 30px;
  border: 1px solid var(--border);
  animation: fadeInUp 1.0s cubic-bezier(0.4,0,0.2,1);
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.submit-section:hover { border-color: rgba(108,63,197,0.1); }
.submit-section h3 {
  margin-bottom: 10px; color: rgba(255,255,255,0.15);
  font-weight: 600; font-size: 0.8em;
  letter-spacing: 4px; text-transform: uppercase;
}
.submit-section input {
  width: 100%; padding: 16px 20px; font-size: 1.2em;
  text-align: center; letter-spacing: 8px; margin: 12px 0;
  font-family: 'Courier New', monospace;
  border: 1px solid var(--border); border-radius: 14px;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  background: rgba(255,255,255,0.01); color: rgba(255,255,255,0.4);
}
.submit-section input::placeholder { color: rgba(255,255,255,0.1); }
.submit-section input:focus {
  border-color: var(--purple); outline: none;
  background: rgba(255,255,255,0.02);
  box-shadow: 0 0 60px rgba(108,63,197,0.05); transform: scale(1.01);
}

/* MESSAGE */
.message {
  margin-top: 15px; padding: 14px 20px; border-radius: 14px;
  text-align: center; font-weight: 600;
  animation: slideIn 0.4s cubic-bezier(0.4,0,0.2,1);
  font-size: 0.8em; letter-spacing: 1px;
}
.message.success {
  background: rgba(0,255,0,0.02); border: 1px solid rgba(0,255,0,0.08);
  color: rgba(0,220,0,0.4);
}
.message.error {
  background: rgba(255,0,0,0.02); border: 1px solid rgba(255,0,0,0.08);
  color: rgba(255,80,80,0.4);
}

/* DASHBOARD GRID */
.dashboard-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 25px;
}
@media (max-width: 700px) {
  .dashboard-grid { grid-template-columns: 1fr; }
}

/* PANEL */
.panel {
  background: rgba(255,255,255,0.01);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 18px; padding: 22px;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  animation: fadeInUp 0.9s cubic-bezier(0.4,0,0.2,1);
}
.panel:hover {
  border-color: rgba(108,63,197,0.1);
  box-shadow: 0 4px 30px rgba(0,0,0,0.1);
}
.panel-title {
  color: rgba(255,255,255,0.1); font-weight: 700;
  font-size: 0.75em; letter-spacing: 4px;
  text-transform: uppercase; margin-bottom: 16px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}

/* LIST ITEMS */
.list-scroll { max-height: 280px; overflow-y: auto; }
.list-scroll::-webkit-scrollbar { width: 2px; }
.list-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); }

.list-item {
  background: rgba(255,255,255,0.01);
  padding: 13px 16px; margin: 8px 0;
  border-radius: 12px; border: 1px solid rgba(255,255,255,0.01);
  color: rgba(255,255,255,0.25); font-size: 0.83em;
  display: flex; justify-content: space-between; align-items: center;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  animation: fadeInUp 0.5s cubic-bezier(0.4,0,0.2,1);
}
.list-item:hover {
  transform: translateX(6px);
  border-color: rgba(108,63,197,0.25);
  background: rgba(108,63,197,0.06);
  box-shadow: 0 0 18px rgba(108,63,197,0.18), inset 0 0 12px rgba(108,63,197,0.05);
  color: rgba(255,255,255,0.55);
}
.list-item.gold  { border-left: 2px solid rgba(255,215,0,0.15); background: rgba(255,215,0,0.02); }
.list-item.silver{ border-left: 2px solid rgba(192,192,192,0.08); }
.list-item.bronze{ border-left: 2px solid rgba(205,127,50,0.08); }
.list-item.ok    { border-left: 2px solid rgba(0,255,0,0.06); }
.list-item.fail  { border-left: 2px solid rgba(255,0,0,0.06); }

.list-item.gold:hover  { border-color: rgba(255,215,0,0.4); box-shadow: 0 0 20px rgba(255,215,0,0.15), inset 0 0 12px rgba(255,215,0,0.05); background: rgba(255,215,0,0.05); }
.list-item.silver:hover{ border-color: rgba(192,192,192,0.3); box-shadow: 0 0 20px rgba(192,192,192,0.1), inset 0 0 12px rgba(192,192,192,0.04); }
.list-item.bronze:hover{ border-color: rgba(205,127,50,0.3); box-shadow: 0 0 20px rgba(205,127,50,0.1), inset 0 0 12px rgba(205,127,50,0.04); }
.list-item.ok:hover    { border-color: rgba(0,255,0,0.3); box-shadow: 0 0 20px rgba(0,255,0,0.1), inset 0 0 12px rgba(0,255,0,0.04); background: rgba(0,255,0,0.03); }
.list-item.fail:hover  { border-color: rgba(255,80,80,0.3); box-shadow: 0 0 20px rgba(255,80,80,0.1), inset 0 0 12px rgba(255,80,80,0.04); background: rgba(255,50,50,0.03); }

.pts {
  font-weight: 700; color: rgba(245,197,24,0.3); font-size: 0.9em;
}

/* SHIP SVG */
.ship-svg { width: 100%; height: 100%; fill: rgba(200,190,230,0.5); }
</style>
</head>
<body>

<!-- BACKGROUND SCENE -->
<div class="scene">
  <div class="atmosphere"></div>
  <div class="sun"></div>
  <div class="ship">
    <svg class="ship-svg" viewBox="0 0 190 120" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 80 Q95 110 170 80 L160 95 Q95 120 30 95 Z" fill="rgba(180,160,220,0.4)"/>
      <rect x="55" y="50" width="80" height="35" rx="6" fill="rgba(180,160,220,0.25)"/>
      <ellipse cx="95" cy="50" rx="28" ry="18" fill="rgba(108,63,197,0.3)"/>
      <ellipse cx="95" cy="50" rx="18" ry="11" fill="rgba(200,190,255,0.08)"/>
      <path d="M55 75 L10 95 L40 78 Z" fill="rgba(180,160,220,0.2)"/>
      <path d="M135 75 L180 95 L150 78 Z" fill="rgba(180,160,220,0.2)"/>
      <ellipse cx="72" cy="87" rx="6" ry="4" fill="rgba(245,197,24,0.25)"/>
      <ellipse cx="118" cy="87" rx="6" ry="4" fill="rgba(245,197,24,0.25)"/>
      <line x1="95" y1="32" x2="95" y2="18" stroke="rgba(200,190,230,0.3)" stroke-width="1.5"/>
      <circle cx="95" cy="16" r="3" fill="rgba(245,197,24,0.5)"/>
    </svg>
  </div>
  <div class="horizon"></div>
  <div class="tagline-scene">NAVIGATE THE UNKNOWN</div>
</div>

<!-- DASHBOARD -->
<div class="glass-container">
  <div class="game-title">ROADFIVE</div>
  <div class="tagline-text">Interstellar Rewards Protocol</div>

  <!-- HEADER -->
  <div class="dashboard-header">
    <div>
      <h2 style="font-size:1em; font-weight:300;">
        Welcome back, <span style="font-weight:700; color:rgba(255,255,255,0.8);" id="displayName">Pilot</span>
      </h2>
      <div style="font-size:0.75em; color:var(--muted); margin-top:4px; letter-spacing:1px;">
        Session active · Sector 4
      </div>
    </div>
    <div class="header-actions">
      <span class="owner-label">CREW</span>
      <button class="btn btn-secondary" onclick="viewHistory()">History</button>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- PLAYER STATS -->
  <div class="player-stats">
    <h2>Pilot <span id="displayName2">Pilot</span> — standing by for mission</h2>
    <div class="points-card">
      <h3>Total Points</h3>
      <div class="points-value" id="totalPoints">4,820</div>
    </div>
    
    <!-- CODES SECTION -->
    <div class="player-codes">
      <h4>🎯 Your Access Codes</h4>
      <div class="code-grid" id="codeGrid">
        <!-- Codes will be populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- SUBMIT CODE -->
  <div class="submit-section">
    <h3>Submit Access Code</h3>
    <input type="text" placeholder="· · · · · · · ·" maxlength="12" id="codeInput"/>
    <button class="btn btn-primary btn-full" onclick="submitCode()">Submit Code</button>
    <div class="message success" id="msg-success" style="display:none;">✓ &nbsp; Code accepted — +250 pts</div>
    <div class="message error" id="msg-error" style="display:none;">✕ &nbsp; Invalid or expired code</div>
  </div>

  <!-- DASHBOARD GRID -->
  <div class="dashboard-grid">

    <!-- LEADERBOARD -->
    <div class="panel">
      <div class="panel-title">Leaderboard</div>
      <div class="list-scroll" id="leaderboardList">
        <!-- Leaderboard populated by JavaScript -->
      </div>
    </div>

    <!-- HISTORY -->
    <div class="panel">
      <div class="panel-title">Code History</div>
      <div class="list-scroll" id="historyList">
        <!-- History populated by JavaScript -->
      </div>
    </div>

  </div><!-- /grid -->

</div><!-- /glass-container -->

<script>
// ============================================
// MAIN JAVASCRIPT FOR PLAYER DASHBOARD
// ============================================

// ─── CHECK LOGIN STATUS ─────────────────────
const currentUser = JSON.parse(localStorage.getItem('roadfive_current_user'));

if (!currentUser) {
  // No user logged in, redirect to register
  window.location.href = 'register.html';
}

// ─── GET ALL USERS ──────────────────────────
function getUsers() {
  return JSON.parse(localStorage.getItem('roadfive_users') || '[]');
}

function saveUsers(users) {
  localStorage.setItem('roadfive_users', JSON.stringify(users));
}

// ─── UPDATE USER IN STORAGE ─────────────────
function updateUser(updatedUser) {
  const users = getUsers();
  const index = users.findIndex(u => u.id === updatedUser.id);
  if (index !== -1) {
    users[index] = updatedUser;
    saveUsers(users);
    localStorage.setItem('roadfive_current_user', JSON.stringify(updatedUser));
  }
}

// ─── DISPLAY USER INFO ──────────────────────
function displayUserInfo() {
  const user = JSON.parse(localStorage.getItem('roadfive_current_user'));
  
  // Update name displays
  document.getElementById('displayName').textContent = user.username;
  document.getElementById('displayName2').textContent = user.username;
  
  // Update points
  document.getElementById('totalPoints').textContent = user.points.toLocaleString();
  
  // Update leaderboard
  updateLeaderboard();
  
  // Update code grid
  updateCodeGrid();
  
  // Update history
  updateHistory();
}

// ─── UPDATE LEADERBOARD ─────────────────────
function updateLeaderboard() {
  const users = getUsers();
  const currentUserData = JSON.parse(localStorage.getItem('roadfive_current_user'));
  
  // Sort by points (highest first)
  const sorted = [...users].sort((a, b) => b.points - a.points);
  
  const leaderboardList = document.getElementById('leaderboardList');
  leaderboardList.innerHTML = '';
  
  sorted.forEach((user, index) => {
    const div = document.createElement('div');
    div.className = 'list-item';
    
    // Add medal for top 3
    let medal = '';
    let extraClass = '';
    if (index === 0) { medal = '🥇'; extraClass = 'gold'; }
    else if (index === 1) { medal = '🥈'; extraClass = 'silver'; }
    else if (index === 2) { medal = '🥉'; extraClass = 'bronze'; }
    
    if (extraClass) div.classList.add(extraClass);
    
    // Highlight current user
    const isCurrentUser = user.id === currentUserData.id;
    if (isCurrentUser) {
      div.style.borderColor = 'rgba(108,63,197,0.4)';
      div.style.background = 'rgba(108,63,197,0.05)';
    }
    
    const nameSpan = document.createElement('span');
    nameSpan.textContent = medal ? `${medal}  ${user.username}` : `    ${user.username}`;
    if (isCurrentUser) {
      nameSpan.innerHTML += ' <span style="color:rgba(108,63,197,0.3);font-size:0.7em;">(you)</span>';
    }
    
    const ptsSpan = document.createElement('span');
    ptsSpan.className = 'pts';
    ptsSpan.textContent = user.points.toLocaleString();
    
    div.appendChild(nameSpan);
    div.appendChild(ptsSpan);
    leaderboardList.appendChild(div);
  });
}

// ─── UPDATE CODE GRID ───────────────────────
function updateCodeGrid() {
  const user = JSON.parse(localStorage.getItem('roadfive_current_user'));
  const codeGrid = document.getElementById('codeGrid');
  codeGrid.innerHTML = '';
  
  // Default codes if none exist
  const codes = user.codes || ['RF-4421', 'RF-3390', 'RF-2201', 'RF-1105', 'RF-0882'];
  
  // Add some extra unused codes
  const allCodes = [...codes, 'RF-7723', 'RF-5567', 'RF-9912', 'RF-3344'];
  
  allCodes.forEach(code => {
    const badge = document.createElement('div');
    badge.className = 'code-badge';
    
    // Mark used codes
    if (codes.includes(code)) {
      badge.classList.add('used');
      badge.textContent = `${code} ✓`;
    } else {
      badge.textContent = code;
    }
    
    codeGrid.appendChild(badge);
  });
}

    { code: 'RF-0882', points: 500, status: 'ok' }
  ];
  
  historyItems.forEach(item => {
    const div = document.createElement('div');
    div.className = `list-item ${item.status}`;
    
    const codeSpan = document.createElement('span');
    codeSpan.textContent = item.code;
    
    const ptsSpan = document.createElement('span');
    ptsSpan.className = 'pts';

    div.appendChild(ptsSpan);
    historyList.appendChild(div);
  });
}
